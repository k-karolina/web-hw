<!DOCTYPE html>
<html>
<head>
    <title>AI Students Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="topbar">
    <h2>AI Students</h2>
    <button onclick="toggleTheme()">🌙</button>
</div>

<div class="container">

    <!-- LEFT: STUDENTS -->
    <div class="sidebar">
        <h3>Students</h3>
        <div id="students"></div>
    </div>

    <!-- RIGHT: INFO CARD -->
    <div class="card">
        <h3>Select a student to chat</h3>
        <p>Click on a student to open chat window</p>
    </div>

</div>

<!-- POPUP CHAT -->
<div id="chatModal" class="modal hidden">
    <div class="modalContent">
        <div class="modalHeader">
            <span id="chatName"></span>
            <button onclick="closeChat()">✖</button>
        </div>

        <div id="messages"></div>

        <div class="chatInput">
            <input id="msg" placeholder="Type message...">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
