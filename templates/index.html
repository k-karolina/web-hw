<!-- templates/index.html -->

<!DOCTYPE html>
<html>

<head>
    <title>AI Students Chat</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="topbar">

    <h2>AI Students Chat</h2>

    <button onclick="toggleTheme()">
        🌙
    </button>

</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h3>Students</h3>

        <!-- ADD STUDENT -->
        <div class="formBox">

            <input
                id="newName"
                placeholder="Name"
            >

            <input
                id="newSurname"
                placeholder="Surname"
            >

            <textarea
                id="newPersonality"
                placeholder="Personality"
            ></textarea>

            <button onclick="addStudent()">
                Add Student
            </button>

        </div>

        <!-- STUDENTS -->
        <div id="students"></div>

    </div>

    <!-- RIGHT CARD -->
    <div class="card">

        <h2>Select a student</h2>

        <p>
            Click on somebody to start chatting
        </p>

    </div>

</div>

<!-- CHAT MODAL -->
<div id="chatModal" class="modal hidden">

    <div class="modalContent">

        <!-- HEADER -->
        <div class="modalHeader">

            <span id="chatName"></span>

            <button onclick="closeChat()">
                ✖
            </button>

        </div>

        <!-- CHAT -->
        <div id="messages"></div>

        <!-- INPUT -->
        <div class="chatInput">

            <input
                id="msg"
                placeholder="Type message..."
            >

            <button onclick="send()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
