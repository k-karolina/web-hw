<!DOCTYPE html>
<html>

<head>

    <title>AI Students Chat</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="topbar">

    <h2>AI Students Chat</h2>

    <button onclick="toggleTheme()">
        🌙
    </button>

</div>

<div class="container">

    <div class="sidebar">

        <h3>Students</h3>

        <select onchange="changeSort(this.value)">
            <option value="name">Name A-Z</option>
            <option value="youngest">Youngest</option>
            <option value="oldest">Oldest</option>
        </select>

        <div class="formBox">

            <input
                id="newName"
                placeholder="Name"
            >

            <input
                id="newSurname"
                placeholder="Surname"
            >

            <input
                id="newAge"
                placeholder="Age"
                type="number"
            >

            <textarea
                id="newPersonality"
                placeholder="Personality"
            ></textarea>

            <button onclick="addStudent()">
                Add Student
            </button>

        </div>

        <div id="students"></div>

    </div>

    <div class="card">

        <h2>Select a student</h2>

        <p>
            Click on somebody to start chatting
        </p>

    </div>

</div>

<div id="chatModal" class="modal hidden">

    <div class="modalContent">

        <div class="modalHeader">

            <span id="chatName"></span>

            <button onclick="closeChat()">
                ✖
            </button>

        </div>

        <div id="messages"></div>

        <div class="chatInput">

            <input
                id="msg"
                placeholder="Type message..."
            >

            <button onclick="send()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
